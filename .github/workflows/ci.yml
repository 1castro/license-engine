name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      # Dummy values just so env.ts validation passes during typecheck/build.
      # Real values come from the deploy environment.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci?schema=public
      APP_BASE_URL: http://localhost:3000
      JWT_ISSUER: license.ci
      NEXTAUTH_SECRET: ci-secret-must-be-at-least-32-characters-long
      NEXTAUTH_URL: http://localhost:3000
      ENCRYPTION_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Prisma generate
        run: pnpm --filter @license-engine/server prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
