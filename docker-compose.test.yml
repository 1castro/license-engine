# Throwaway Postgres for integration tests. Separate port (5433) and an
# in-memory tmpfs volume so it never touches the dev database and resets on
# restart. Started by `pnpm test:integration` (see apps/server/package.json).
services:
  test-db:
    image: postgres:16-alpine
    container_name: le-test-db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpass
      POSTGRES_DB: license_engine_test
    ports:
      - '5433:5432'
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U testuser -d license_engine_test']
      interval: 1s
      timeout: 5s
      retries: 20
